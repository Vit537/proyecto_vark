name: Deploy Backend → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

env:
  PROJECT_ID: notification-system-603aa
  SERVICE_NAME: vark-backend
  REGION: us-central1
  IMAGE: gcr.io/notification-system-603aa/vark-backend

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Autenticar con Google Cloud usando la Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Configurar gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Autorizar Docker para subir a GCR
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # 5. Build de la imagen
      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      # 6. Push al Container Registry
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # 7. Desplegar en Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --set-env-vars="DJANGO_SETTINGS_MODULE=config.settings.production" \
            --set-env-vars="ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS_BACKEND }}" \
            --set-env-vars="CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars="DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars="DB_PORT=5432" \
            --set-env-vars="SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" \
            --set-env-vars="GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --set-env-vars="GROQ_MODEL=llama3-8b-8192" \
            --set-env-vars="CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}" \
            --set-env-vars="CELERY_RESULT_BACKEND=${{ secrets.CELERY_BROKER_URL }}"

      # 8. Ejecutar migraciones de DB
      - name: Run DB Migrations
        run: |
          gcloud run jobs create migrate-job-${{ github.run_number }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --set-env-vars="DJANGO_SETTINGS_MODULE=config.settings.production" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars="DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars="DB_PORT=5432" \
            --set-env-vars="SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" \
            --set-env-vars="GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --command="python,manage.py,migrate" || true
          gcloud run jobs execute migrate-job-${{ github.run_number }} \
            --region ${{ env.REGION }} \
            --wait || true

      - name: Print Service URL
        run: |
          echo "Backend URL:"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
