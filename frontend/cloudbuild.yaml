steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_API_URL
      - -t
      - gcr.io/notification-system-603aa/vark-frontend:latest
      - .

images:
  - gcr.io/notification-system-603aa/vark-frontend:latest

# Valor por defecto — sobreescribir con la URL real del backend al ejecutar el comando
substitutions:
  _API_URL: 'https://REEMPLAZA-CON-URL-REAL-DEL-BACKEND/api'
